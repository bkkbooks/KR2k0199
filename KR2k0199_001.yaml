body:
  text: 郭仲産湘州記太平御覽引一事衡陽縣東南有酃湖土人取此水以釀酒其味醇美所謂酃酒每年常獻之晉平吳始薦酃酒於太廟是也卷八百四十五太平寰宇記引一事平樂縣縈山多曲竹有木客形似小兒歌哭行坐衣服不異于人而能隱形山居崖宿至精巧時出市易作器人亦無別就人換供此皆有信義言語亦可解精器木理也卷一百六十三
